<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — LUMIÈRE</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#14110f;--cream:#f7f3ed;--gold:#b08d57}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",system-ui,sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
    .brand{font-family:"Cormorant Garamond",serif;font-size:1.6rem;letter-spacing:.12em;font-weight:700}
    .brand .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-right:.4rem}
    h1{font-family:"Cormorant Garamond",serif;font-size:clamp(4rem,16vw,9rem);line-height:1;margin:1.2rem 0 .4rem}
    h1 em{font-style:italic;color:var(--gold)}
    p{color:#4a443f;max-width:420px;margin:0 auto 1.8rem}
    a.btn{display:inline-flex;padding:.85rem 1.7rem;border-radius:40px;background:var(--ink);color:var(--cream);text-decoration:none;font-weight:600;font-size:.92rem;transition:.3s}
    a.btn:hover{background:var(--gold);transform:translateY(-2px)}
  </style>
</head>
<body>
  <div>
    <div class="brand"><span class="dot"></span>LUMIÈRE</div>
    <h1>Lost in <em>focus</em></h1>
    <p>The page you're looking for has slipped out of frame. Let's get you back to the collection.</p>
    <a class="btn" href="index.html">Return home</a>
  </div>
</body>
</html>
